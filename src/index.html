<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>Confeitaria Delícia</h1>
    </header>

    <main class="question-container">
        <div class="image-wrapper">
            <img src="https://via.placeholder.com/300" alt="Imagem do Doce" class="centered-image">
        </div>
        
        <section class="content">
            <p class="question-text">Qual o seu tipo de doce favorito?</p>
            
            <div class="options">
                <button class="option-btn">Chocolate</button>
                <button class="option-btn">Frutas</button>
                <button class="option-btn">Cremosos</button>
            </div>
        </section>
    </main>

    <footer class="navigation-bar">
        <button class="nav-btn prev-btn">Voltar</button>
        <button class="nav-btn next-btn">Próximo</button>
    </footer>
</body>
</html>
